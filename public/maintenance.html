<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <meta name="robots" content="none">
    <title>En maintenance — Heldonica</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #f5f3ef;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            color: #1a1a1a;
            padding: 1.5rem;
        }
        .container {
            max-width: 500px;
            width: 100%;
            text-align: center;
        }
        .logo {
            font-size: 2rem;
            font-weight: 600;
            color: #6b2a1a;
            margin-bottom: 2.5rem;
            letter-spacing: 0.02em;
            font-family: Georgia, serif;
        }
        .icon-container {
            margin-bottom: 2rem;
        }
        .icon {
            display: inline-block;
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        h1 {
            font-size: 2rem;
            font-weight: 500;
            color: #1a1a1a;
            margin-bottom: 1.5rem;
            line-height: 1.3;
            font-family: Georgia, serif;
        }
        .message {
            font-size: 1.125rem;
            color: #555;
            line-height: 1.7;
            margin-bottom: 2.5rem;
            padding: 1.25rem;
            background: #faf9f7;
            border-radius: 0.75rem;
            border-left: 3px solid #6b2a1a;
            text-align: left;
        }
        .cta {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.875rem 1.5rem;
            background: #6b2a1a;
            color: #fff;
            text-decoration: none;
            border-radius: 0.5rem;
            font-weight: 500;
            font-size: 0.9375rem;
            transition: background 0.2s ease;
        }
        .cta:hover {
            background: #7a3220;
        }
        .divider {
            width: 40px;
            height: 2px;
            background: #e8e0d8;
            margin: 2rem auto;
        }
        .footer-note {
            font-size: 0.8125rem;
            color: #888;
            margin-top: 2rem;
        }
        @media (max-width: 480px) {
            .logo, h1 {
                font-size: 1.75rem;
            }
            h1 {
                font-size: 1.625rem;
            }
            .message {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <main class="container">
        <div class="logo">Heldonica</div>
        
        <div class="icon-container">
            <span class="icon">
                <svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="32" cy="32" r="31" stroke="#6b2a1a" stroke-width="2" fill="none"/>
                    <path d="M32 48C32 48 18 38 18 26C18 18 24 14 32 18C40 22 46 30 46 38C46 44 40 48 32 48Z" fill="#4A7C59" stroke="#6b2a1a" stroke-width="1.5"/>
                    <path d="M32 18V48" stroke="#6b2a1a" stroke-width="1.5" stroke-linecap="round"/>
                    <path d="M32 24C26 22 22 26 22 26" stroke="#6b2a1a" stroke-width="1.5" stroke-linecap="round" fill="none"/>
                    <path d="M32 32C38 30 42 34 42 34" stroke="#6b2a1a" stroke-width="1.5" stroke-linecap="round" fill="none"/>
                    <path d="M32 40C26 38 22 40 22 40" stroke="#6b2a1a" stroke-width="1.5" stroke-linecap="round" fill="none"/>
                </svg>
            </span>
        </div>

        <h1>On prépare quelque chose pour toi…</h1>

        <div class="message">
            On revient très vite avec de nouvelles pépites ! 🌿
        </div>

        <a href="https://www.instagram.com/heldonica" class="cta" target="_blank" rel="noopener noreferrer">
            Suivre nos aventures 🌿
        </a>

        <div class="divider"></div>

        <p class="footer-note">
            Merci de ta patience 🌿
        </p>
    </main>
</body>
</html>
