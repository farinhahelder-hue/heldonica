<svg width="400" height="300" viewBox="0 0 400 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="400" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f8f6f4"/>
      <stop offset="100%" stop-color="#e8e4e0"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="400" y2="150" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6b2a1a" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#6b2a1a" stop-opacity="0.02"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="300" fill="url(#bgGrad)"/>
  
  <!-- Decorative circles -->
  <circle cx="320" cy="40" r="80" fill="#6b2a1a" opacity="0.04"/>
  <circle cx="60" cy="260" r="50" fill="#6b2a1a" opacity="0.04"/>
  <circle cx="350" cy="250" r="30" fill="#6b2a1a" opacity="0.03"/>
  
  <!-- Subtle mountain lines -->
  <path d="M0 250 Q100 200 150 220 Q200 180 250 210 Q300 170 400 200 L400 300 L0 300 Z" fill="#d4cfc9" opacity="0.5"/>
  
  <!-- Logo mark - stylized compass/navigation element -->
  <g transform="translate(200, 150)">
    <circle r="40" fill="none" stroke="#6b2a1a" stroke-width="1" opacity="0.15"/>
    <circle r="30" fill="none" stroke="#6b2a1a" stroke-width="0.5" opacity="0.1"/>
    <!-- Compass points -->
    <path d="M0 -25 L3 -15 L0 -10 L-3 -15 Z" fill="#6b2a1a" opacity="0.2"/>
    <path d="M0 25 L3 15 L0 10 L-3 15 Z" fill="#6b2a1a" opacity="0.2"/>
    <path d="M-25 0 L-15 3 L-10 0 L-15 -3 Z" fill="#6b2a1a" opacity="0.2"/>
    <path d="M25 0 L15 3 L10 0 L15 -3 Z" fill="#6b2a1a" opacity="0.2"/>
    <!-- Center dot -->
    <circle r="3" fill="#6b2a1a" opacity="0.2"/>
  </g>
</svg>