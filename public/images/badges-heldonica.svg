<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 420" role="img" aria-labelledby="title desc">
  <title id="title">Badge Heldonica</title>
  <desc id="desc">Fallback visuel Heldonica dans la palette eucalyptus et teal.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#006D77"/>
      <stop offset="55%" stop-color="#2A97A1"/>
      <stop offset="100%" stop-color="#4ECDC4"/>
    </linearGradient>
    <radialGradient id="halo" cx="50%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="640" height="420" rx="36" fill="url(#bg)"/>
  <rect width="640" height="420" rx="36" fill="url(#halo)"/>

  <g transform="translate(124 88)">
    <rect x="0" y="0" width="392" height="244" rx="24" fill="#FFFFFF" fill-opacity="0.12" stroke="#FFFFFF" stroke-opacity="0.35"/>
    <g transform="translate(130 34)">
      <circle cx="66" cy="66" r="66" fill="#FFFFFF" fill-opacity="0.15" stroke="#FFFFFF" stroke-opacity="0.3" stroke-width="1.5" stroke-dasharray="6 6"/>
      <g transform="translate(16 16) scale(3.125)">
        <path d="M8 21l6.5-9 6.5 9" stroke="#FFFFFF" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" />
        <path d="M14 21l5-7 6 7" stroke="#FFFFFF" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" />
        <path d="M5 25c6-2.5 11 0.5 16-2.5s5-3.5 7-2" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round" />
      </g>
    </g>
    <text x="196" y="196" text-anchor="middle" fill="#FFFFFF" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="700" letter-spacing="3">
