# ============================================================
# AI Automation Workflow - Heldonica.fr
# Orchestre Jules, AllHands (OpenHands) et Gemini
# ============================================================
name: AI Automation Pipeline

on:
  issues:
    types: [labeled]
  schedule:
    # Rapport sprint AllHands chaque lundi 8h Paris (7h UTC)
    - cron: '0 7 * * 1'
    # Review PR ouvertes par Jules chaque jour 9h UTC
    - cron: '0 9 * * *'
  workflow_dispatch:
    inputs:
      agent:
        description: 'Agent a declencher (jules|allhands|gemini|all)'
        required: true
        default: 'all'
        type: choice
        options:
          - jules
          - allhands
          - gemini
          - all
      task:
        description: 'Description de la tache (optionnel)'
        required: false
        type: string

jobs:
  # ============================================================
  # JOB 1 - Notifier quand une issue est labelisee "jules"
  # Jules se declenche automatiquement depuis son dashboard
  # Ce job cree un commentaire de suivi sur l'issue
  # ============================================================
  jules-issue-tracker:
    name: Jules Issue Tracker
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'issues' &&
      (github.event.label.name == 'jules' || github.event.label.name == 'allhands')
    permissions:
      issues: write
    steps:
      - name: Commenter l'issue pour Jules
        if: github.event.label.name == 'jules'
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: [
                '## Jules AI - Prise en charge',
                '',
                `**Issue**: ${issue.title}`,
                `**Assignee**: Jules (Google AI Agent)`,
                `**Date**: ${new Date().toISOString().split('T')[0]}`,
                '',
                '> Jules va analyser cette issue, creer une branche et ouvrir une PR automatiquement.',
                '> Verifie le dashboard Jules sur https://jules.google.com pour suivre la progression.',
                '',
                '**Stack**: Next.js 14 + Supabase + Vercel | Repo: `heldonica`',
                '',
                '---',
                '_Auto-generated by AI Automation Pipeline_'
              ].join('\n')
            });

      - name: Commenter l'issue pour AllHands
        if: github.event.label.name == 'allhands'
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: [
                '## OpenHands/AllHands - Prise en charge',
                '',
                `**Issue**: ${issue.title}`,
                `**Agent**: OpenHands (AllHands AI)`,
                `**Date**: ${new Date().toISOString().split('T')[0]}`,
                '',
                '> OpenHands va traiter cette tache en mode dev agent complet.',
                '> Consulte PROMPT_ALLHANDS.md pour les instructions de session.',
                '',
                '**Contexte**: Lis JULES_MEMORY.md + JULES_TASKS.md avant de commencer.',
                '',
                '---',
                '_Auto-generated by AI Automation Pipeline_'
              ].join('\n')
            });

  # ============================================================
  # JOB 2 - Rapport hebdomadaire sprint (chaque lundi)
  # Cree une issue de synthese des taches en cours
  # ============================================================
  weekly-sprint-report:
    name: Weekly Sprint Report
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    permissions:
      issues: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generer rapport sprint lundi
        if: github.event.schedule == '0 7 * * 1'
        uses: actions/github-script@v7
        with:
          script: |
            const date = new Date().toISOString().split('T')[0];
            const weekNum = Math.ceil((new Date() - new Date(new Date().getFullYear(), 0, 1)) / (7 * 24 * 60 * 60 * 1000));

            // Lire les PRs ouvertes par les agents IA
            const prs = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 20
            });

            const aiPRs = prs.data.filter(pr =>
              pr.user.login.includes('jules') ||
              pr.user.login.includes('openhands') ||
              pr.user.login.includes('bot')
            );

            const prList = aiPRs.length > 0
              ? aiPRs.map(pr => `- [ ] #${pr.number} - ${pr.title} (@${pr.user.login})`).join('\n')
              : '- Aucune PR IA ouverte cette semaine';

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Sprint W${weekNum}] Rapport AI Automation - ${date}`,
              labels: ['ai-task'],
              body: [
                '# Rapport Sprint Hebdomadaire - Heldonica.fr',
                '',
                `**Semaine**: W${weekNum} | **Date**: ${date}`,
                '',
                '## PRs en attente de review (generees par IA)',
                '',
                prList,
                '',
                '## Actions a faire',
                '',
                '- [ ] Reviewer et merger les PRs Jules ci-dessus',
                '- [ ] Lancer session AllHands si taches complexes dans JULES_TASKS.md',
                '- [ ] Mettre a jour JULES_MEMORY.md avec les learnings de la semaine',
                '- [ ] Verifier le deploiement Vercel production',
                '',
                '## Agents IA actifs',
                '',
                '| Agent | Role | Status |',
                '|-------|------|--------|',
                '| Jules (Google) | Coding agent - issues/PRs auto | Actif via label `jules` |',
                '| AllHands (OpenHands) | Sprint dev agent | Manuel via PROMPT_ALLHANDS.md |',
                '| Gemini | Contenu SEO + analyse | Via n8n webhook |',
                '',
                '---',
                '_Auto-generated by AI Automation Pipeline - chaque lundi 8h_'
              ].join('\n')
            });

  # ============================================================
  # JOB 3 - Review automatique des PRs Jules
  # Verifie que les PRs respectent les conventions du projet
  # ============================================================
  pr-quality-check:
    name: PR Quality Check (AI PRs)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit
        continue-on-error: true

      - name: ESLint
        run: npx eslint . --ext .ts,.tsx --max-warnings 0
        continue-on-error: true

  # ============================================================
  # JOB 4 - Declenchement manuel AllHands ou Gemini
  # ============================================================
  manual-trigger:
    name: Manual Agent Trigger
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    permissions:
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Creer issue pour l'agent demande
        uses: actions/github-script@v7
        with:
          script: |
            const agent = '${{ github.event.inputs.agent }}';
            const task = '${{ github.event.inputs.task }}' || 'Tache depuis declenchement manuel';
            const date = new Date().toISOString().split('T')[0];

            const agentConfig = {
              jules: { label: 'jules', emoji: '⚡', desc: 'Jules va analyser et coder cette tache.' },
              allhands: { label: 'allhands', emoji: '🤖', desc: 'Lance une session AllHands avec PROMPT_ALLHANDS.md.' },
              gemini: { label: 'gemini-content', emoji: '✨', desc: 'Gemini va generer le contenu SEO via n8n.' },
              all: { label: 'ai-task', emoji: '🚀', desc: 'Tous les agents sont notifies.' }
            };

            const config = agentConfig[agent] || agentConfig.all;

            if (agent !== 'all') {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `[${agent.toUpperCase()}] ${task}`,
                labels: [config.label],
                body: [
                  `## ${config.emoji} Tache declenchee manuellement`,
                  '',
                  `**Agent**: ${agent}`,
                  `**Tache**: ${task}`,
                  `**Date**: ${date}`,
                  `**Declenche par**: @${{ github.actor }}`,
                  '',
                  config.desc,
                  '',
                  '**Contexte stack**:',
                  '- Framework: Next.js 14 App Router',
                  '- Base de donnees: Supabase (PostgreSQL)',
                  '- Deploy: Vercel',
                  '- Tests: Jest + Playwright',
                  '',
                  '**Fichiers de reference**:',
                  '- `JULES_TASKS.md` - Backlog taches',
                  '- `JULES_MEMORY.md` - Historique sessions',
                  '- `PROMPT_ALLHANDS.md` - Instructions AllHands',
                  '',
                  '---',
                  '_Auto-generated by AI Automation Pipeline_'
                ].join('\n')
              });
            } else {
              core.notice(`Declenchement ALL agents pour: ${task}`);
            }
